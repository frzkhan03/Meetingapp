# PyTalk Nginx Configuration (Multi-Worker — 4 Daphne instances)
# Place this file at: /etc/nginx/sites-available/pytalk
# Symlink to enable: ln -s /etc/nginx/sites-available/pytalk /etc/nginx/sites-enabled/pytalk
#
# Custom Subdomain Support:
# To enable custom subdomains (e.g., acme.pytalk.veriright.com):
# 1. Obtain a wildcard SSL certificate (*.pytalk.veriright.com)
#    - Let's Encrypt: Use DNS-01 challenge (certbot --dns-<provider>)
#    - Example: certbot certonly --dns-route53 -d pytalk.veriright.com -d *.pytalk.veriright.com
# 2. Configure DNS: Add wildcard A record *.pytalk.veriright.com -> your-server-ip
# 3. Update ALLOWED_HOSTS in Django: pytalk.veriright.com,.pytalk.veriright.com
#
# Requires: pytalk@.service running on ports 8001-8004
#   systemctl start pytalk@8001 pytalk@8002 pytalk@8003 pytalk@8004

# WebSocket upstream — ip_hash ensures the same client always hits
# the same worker (required because WebSocket state is in-process)
upstream pytalk_websocket {
    ip_hash;
    server 127.0.0.1:8001;
    server 127.0.0.1:8002;
    server 127.0.0.1:8003;
    server 127.0.0.1:8004;
}

# HTTP upstream — least_conn spreads requests evenly
upstream pytalk_http {
    least_conn;
    server 127.0.0.1:8001;
    server 127.0.0.1:8002;
    server 127.0.0.1:8003;
    server 127.0.0.1:8004;
    keepalive 32;
}

server {
    server_name pytalk.veriright.com *.pytalk.veriright.com;

    client_max_body_size 10M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml application/wasm;
    gzip_comp_level 4;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Logging
    access_log /var/log/nginx/pytalk_access.log;
    error_log /var/log/nginx/pytalk_error.log;

    # Static files
    location /static/ {
        alias /opt/pytalk/backend/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # WebSocket connections — routed via ip_hash upstream
    location /ws/ {
        proxy_pass http://pytalk_websocket;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_connect_timeout 60s;
        proxy_buffering off;
    }

    # HTTP requests — routed via least_conn upstream
    location / {
        proxy_pass http://pytalk_http;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/pytalk.veriright.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pytalk.veriright.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    server_name pytalk.veriright.com *.pytalk.veriright.com;
    return 301 https://$host$request_uri;
}
